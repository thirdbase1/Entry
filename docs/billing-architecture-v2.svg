<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 1050" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#475569;stroke-width:1.5}
      .lane{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.5}
      .db{fill:#fffbeb;stroke:#b45309;stroke-width:1.5}
      .t{fill:#0f172a;font-size:15px;font-weight:bold}
      .s{fill:#334155;font-size:12px}
      .n{fill:#64748b;font-size:11px}
      .w{fill:#b91c1c;font-size:11px;font-weight:bold}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;marker-end:url(#a)}
      .lbl{fill:#16a34a;font-size:11px;font-weight:bold}
    </style>
  </defs>
  <text x="40" y="34" class="t" font-size="19">Entry — Billing &amp; Routing Architecture v2</text>
  <text x="40" y="52" class="n">v2 adds: payment lane (Moniepoint/Monnify), pre-flight gate + kill switch, PlanConfig DB (live repricing lever), per-route risk config, append-only ledger</text>

  <!-- entry points -->
  <rect class="box" x="80" y="80" width="300" height="56" rx="10"/>
  <text x="230" y="104" class="t" text-anchor="middle">Chat / Agent (eve-root)</text>
  <text x="230" y="122" class="n" text-anchor="middle">burns Entry Credits</text>
  <rect class="box" x="440" y="80" width="300" height="56" rx="10"/>
  <text x="590" y="104" class="t" text-anchor="middle">BYOK Direct-Chat</text>
  <text x="590" y="122" class="n" text-anchor="middle">user's own key — never burns credits</text>

  <!-- pre-flight gate -->
  <path class="edge" d="M230 136V176"/><path class="edge" d="M590 136V176"/>
  <rect class="box" x="80" y="180" width="660" height="78" rx="10" stroke="#b91c1c"/>
  <text x="410" y="203" class="t" text-anchor="middle">Pre-flight Gate</text>
  <text x="410" y="222" class="s" text-anchor="middle">balance &gt; 0 · reserve estimate for agent runs, settle actual on finish</text>
  <text x="410" y="240" class="s" text-anchor="middle">per-user daily spend cap · <tspan class="w">GLOBAL KILL SWITCH (admin: pause all paid routes)</tspan></text>

  <!-- router -->
  <path class="edge" d="M410 258V294"/>
  <rect class="box" x="200" y="298" width="420" height="46" rx="10"/>
  <text x="410" y="326" class="t" text-anchor="middle">routeAndCallModel( ) — Router</text>

  <!-- routes -->
  <path class="edge" d="M300 344 L165 390"/><path class="edge" d="M410 344V390"/><path class="edge" d="M520 344 L655 390"/>
  <rect class="box" x="40" y="394" width="250" height="118" rx="10"/>
  <circle cx="272" cy="410" r="5" fill="#16a34a"/>
  <text x="56" y="416" class="t" font-size="13">Route A: Anthropic Direct</text>
  <text x="56" y="436" class="s">cost ratio 1.0x · no risk cap</text>
  <text x="56" y="453" class="s">models: all (incl. Mythos)</text>
  <text x="56" y="470" class="n">role: permanent fallback —</text>
  <text x="56" y="485" class="n">margins compress, users feel nothing</text>
  <rect class="box" x="310" y="394" width="250" height="118" rx="10"/>
  <circle cx="542" cy="410" r="5" fill="#16a34a"/>
  <text x="326" y="416" class="t" font-size="13">Route B: Discount Reseller</text>
  <text x="326" y="436" class="s">cost ratio 0.067x · monthly risk cap $</text>
  <text x="326" y="453" class="s">models: up to Fable 5 (no Mythos)</text>
  <text x="326" y="470" class="w">auto-disable after N auth failures</text>
  <text x="326" y="485" class="n">gray-market: assume it can die any day</text>
  <rect class="box" x="580" y="394" width="250" height="118" rx="10"/>
  <circle cx="812" cy="410" r="5" fill="#16a34a"/>
  <text x="596" y="416" class="t" font-size="13">Route C: Reseller B</text>
  <text x="596" y="436" class="s">same config shape as B:</text>
  <text x="596" y="453" class="s">cost ratio · risk cap · allowed models</text>
  <text x="596" y="470" class="w">auto-disable after N auth failures</text>
  <text x="596" y="485" class="n">every route = one RouteConfig row</text>

  <!-- usage ledger -->
  <path class="edge" d="M165 512 L340 556"/><path class="edge" d="M435 512V556"/><path class="edge" d="M705 512 L530 556"/>
  <rect class="db" x="180" y="560" width="480" height="76" rx="10"/>
  <text x="420" y="584" class="t" text-anchor="middle">UsageEvent Ledger</text>
  <text x="420" y="603" class="s" text-anchor="middle">tokens · face value $ (official rate) · actual cost $ (route rate) · route id</text>
  <text x="420" y="621" class="n" text-anchor="middle">BYOK events tagged: actual cost $0, face value $0, credit burn = none</text>

  <!-- credit ledger + admin billing -->
  <path class="edge" d="M310 636 L300 692"/><path class="edge" d="M560 636 L700 692"/>
  <rect class="db" x="80" y="696" width="440" height="92" rx="10"/>
  <text x="300" y="719" class="t" text-anchor="middle">CreditTransaction Ledger — APPEND-ONLY</text>
  <text x="300" y="738" class="s" text-anchor="middle">rows: purchase · monthly grant · burn · expiry · admin adjustment</text>
  <text x="300" y="756" class="s" text-anchor="middle">UserCreditBalance = cached sum of rows (never a lone mutable column)</text>
  <text x="300" y="774" class="n" text-anchor="middle">audit-safe: every balance change has a row + reason + actor</text>
  <rect class="box" x="580" y="696" width="340" height="70" rx="10"/>
  <text x="750" y="720" class="t" text-anchor="middle">Admin Billing / Analysis</text>
  <text x="750" y="739" class="s" text-anchor="middle">margin = face − actual, per user / model /</text>
  <text x="750" y="755" class="s" text-anchor="middle">route / day · route health · burn forecasts</text>
  <path class="edge" d="M520 742 H576"/>

  <!-- settings -->
  <path class="edge" d="M180 788 L180 826"/>
  <rect class="box" x="80" y="830" width="320" height="50" rx="10"/>
  <text x="240" y="851" class="t" text-anchor="middle" font-size="13">Settings: Balance Display</text>
  <text x="240" y="868" class="n" text-anchor="middle">"9.4 Credits left ($9.40 of AI usage)" — always visible</text>

  <!-- PAYMENT LANE -->
  <rect x="905" y="66" width="435" height="560" rx="12" fill="none" stroke="#16a34a" stroke-dasharray="6 4"/>
  <text x="920" y="88" class="lbl">MONEY-IN LANE (new in v2)</text>
  <rect class="lane" x="940" y="100" width="370" height="66" rx="10"/>
  <text x="1125" y="124" class="t" text-anchor="middle" font-size="13">Checkout — plan / top-up</text>
  <text x="1125" y="142" class="s" text-anchor="middle">₦ prices + credits read live from PlanConfig</text>
  <text x="1125" y="157" class="n" text-anchor="middle">shows the multiplier: "₦7,500 → $15 of AI (3x)"</text>
  <path class="edge" d="M1125 166V196"/>
  <rect class="lane" x="940" y="200" width="370" height="62" rx="10"/>
  <text x="1125" y="224" class="t" text-anchor="middle" font-size="13">Moniepoint / Monnify</text>
  <text x="1125" y="242" class="s" text-anchor="middle">card · bank transfer · USSD (NGN)</text>
  <path class="edge" d="M1125 262V292"/>
  <rect class="lane" x="940" y="296" width="370" height="76" rx="10"/>
  <text x="1125" y="318" class="t" text-anchor="middle" font-size="13">Webhook Handler</text>
  <text x="1125" y="336" class="s" text-anchor="middle">verify signature · re-query gateway for amount</text>
  <text x="1125" y="352" class="s" text-anchor="middle">idempotent by transaction reference (no double-credit)</text>
  <path class="edge" d="M940 350 C700 400 380 560 320 692"/>
  <text x="640" y="475" class="lbl">CreditTransaction(type: purchase)</text>

  <!-- PlanConfig -->
  <rect class="db" x="940" y="470" width="370" height="130" rx="10"/>
  <text x="1125" y="493" class="t" text-anchor="middle" font-size="13">PlanConfig — DB table, NOT code</text>
  <text x="1125" y="512" class="s" text-anchor="middle">per plan: price ₦ · credits included · shown multiplier</text>
  <text x="1125" y="529" class="s" text-anchor="middle">model access · rollover rule · active flag</text>
  <text x="1125" y="547" class="w" text-anchor="middle">THE REPRICING LEVER: edit in admin UI,</text>
  <text x="1125" y="562" class="w" text-anchor="middle">takes effect immediately — no deploy</text>
  <text x="1125" y="583" class="n" text-anchor="middle">supplier dies at 2am → cut credit amounts in 2 minutes</text>
  <path class="edge" d="M940 500 C830 470 780 330 744 258"/>
  <text x="800" y="400" class="n">read by Pre-flight Gate + quota logic</text>

  <!-- admin bar -->
  <rect class="box" x="40" y="930" width="1280" height="66" rx="10" stroke-width="2"/>
  <text x="60" y="957" class="t">Admin Page:</text>
  <text x="175" y="957" class="s" font-size="14">Users  |  Billing  |  Provider Routes  |  Plans (edits PlanConfig)  |  Usage Events  |  Audit Log  |</text>
  <text x="885" y="957" class="w" font-size="14">KILL SWITCH</text>
  <text x="60" y="980" class="n">every admin action writes an Audit Log row (actor · action · before/after · timestamp)</text>
  <path class="edge" d="M750 926 L750 770"/>
  <path class="edge" d="M1125 926 L1125 604"/>
  <text x="1140" y="800" class="n">Plans tab edits PlanConfig live</text>
</svg>
