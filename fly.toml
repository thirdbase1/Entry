app = "entry-agent-worker"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.agent"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/eve/v1/health"
    port = 3000
    timeout = "10s"
    type = "http"
