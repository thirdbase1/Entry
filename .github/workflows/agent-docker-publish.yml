name: agent-docker-publish

on:
  push:
    branches:
      - northflank-deploy
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/entry-agent-worker:latest,ghcr.io/${{ github.repository_owner }}/entry-agent-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
